name: Test & Quality

on:
  push:
    branches: [main, dev, dev/*]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff linter
        run: ruff check src/open_pacmuci/ tests/

      - name: Run ruff formatter check
        run: ruff format --check src/open_pacmuci/ tests/

      - name: Check types with mypy
        run: mypy src/open_pacmuci/

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ --cov=open_pacmuci --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          channels: conda-forge,bioconda,defaults
          activate-environment: open-pacmuci-tools
          environment-file: conda/environment.yml

      - name: Run integration tests
        shell: bash -el {0}
        run: |
          conda activate open-pacmuci-tools
          pytest tests/integration/ -m "integration" --no-cov -v
